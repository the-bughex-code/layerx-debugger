name: layerx_debugger
description: "Drop-in debugger and logger for Flutter and GetX: pretty console logs, Dio/http capture, crash handling, route, widget and performance tracking, plus an in-app log viewer."
version: 1.4.0
repository: https://github.com/the-bughex-code/layerx_debugger
homepage: https://github.com/the-bughex-code/layerx_debugger
issue_tracker: https://github.com/the-bughex-code/layerx_debugger/issues
documentation: https://github.com/the-bughex-code/layerx_debugger#readme

topics:
  - logging
  - debugging
  - getx
  - networking
  - devtools

screenshots:
  - description: "Neo Terminal console — every log categorized (UI exceptions, Dart errors, console output, network) in one pipeline."
    path: doc/console.png
  - description: "Network inspector — requests with status, latency and API schema-change detection."
    path: doc/network.png
  - description: "Entry inspector — a captured RenderFlex overflow with source file:line, stack trace and a suggested fix."
    path: doc/inspector.png

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  logger: ^2.5.0
  intl: ">=0.19.0 <0.21.0"
  get: ^4.7.2
  http: ^1.2.0
  # Used only via the opt-in `package:layerx_debugger/dio.dart` entrypoint.
  dio: ^5.7.0

executables:
  setup: setup

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
