name: Publish to pub.dev

# Publishes when a version tag (e.g. v1.0.0) is pushed.
# Uses pub.dev's automated publishing via GitHub OIDC — configure the package's
# "Automated publishing" settings on pub.dev to trust this repository first.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  publish:
    permissions:
      id-token: write # required for OIDC authentication with pub.dev
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
