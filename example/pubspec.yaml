name: layerx_debugger_example
description: "Demonstrates the layerx_debugger package: logging, Dio/http capture, GetX, profiling, crash handling and the in-app viewer."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  layerx_debugger:
    path: ../
  get: ^4.7.2
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
